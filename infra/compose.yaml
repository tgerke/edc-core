name: edc-core

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc-dev-only # local development only; never deploy with this
      POSTGRES_DB: edc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc -d edc"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://edc:edc-dev-only@postgres:5432/edc
      PORT: "3000"
      # DuckLake analytics layer: Parquet files here, catalog in Postgres
      # (one schema + subdirectory per study) — no separate analytics server.
      LAKE_DATA_PATH: /var/lib/edc/lake
      # Engine sidecars; each sees the same Postgres and lake volume.
      R_ENGINE_URL: http://r-engine:8000
      R_ENGINE_CATALOG_URL: postgres://edc:edc-dev-only@postgres:5432/edc
      R_ENGINE_LAKE_PATH: /var/lib/edc/lake
      PY_ENGINE_URL: http://py-engine:8000
      PY_ENGINE_CATALOG_URL: postgres://edc:edc-dev-only@postgres:5432/edc
      PY_ENGINE_LAKE_PATH: /var/lib/edc/lake
    ports:
      - "3000:3000"
    volumes:
      - lakedata:/var/lib/edc/lake
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

  # init: the engine servers run as PID 1 and kill timed-out script
  # subprocesses; anything those scripts spawned reparents to PID 1 and
  # would sit as a zombie without an init to reap it.
  r-engine:
    build:
      context: ../services/r-engine
    init: true
    ports:
      - "8000:8000"
    volumes:
      - lakedata:/var/lib/edc/lake:ro
    depends_on:
      postgres:
        condition: service_healthy

  py-engine:
    build:
      context: ../services/py-engine
    init: true
    ports:
      - "8001:8000"
    volumes:
      - lakedata:/var/lib/edc/lake:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  lakedata:
