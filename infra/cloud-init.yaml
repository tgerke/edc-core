#cloud-config
# Boot a production edc-core host on any Ubuntu 24.04 VM (ADR-0011): Docker,
# the release-pinned compose stack, and basic host hardening. This same file
# is the user_data for every infra/terraform/ root — Terraform substitutes
# the ${...} placeholders via templatefile(). To use it standalone, render
# it first:
#
#   sed -e 's/${domain}/edc.example.org/' \
#       -e 's/${app_version}/0.4.0/' \
#       -e "s/\${postgres_password}/$(openssl rand -hex 24)/" \
#       -e 's/${extra_env}//' \
#       cloud-init.yaml > user-data.yaml
#
# then pass user-data.yaml to your provider's "user data"/"cloud-init" field
# (all of AWS, Azure, DigitalOcean, Hetzner, Proxmox, and Multipass accept
# it). First boot takes a few minutes: watch with `cloud-init status --wait`,
# then create the first admin:
#
#   cd /opt/edc && docker compose -f compose.prod.yaml exec api \
#     pnpm --filter @edc-core/api db:bootstrap-admin
#
# Notes:
# - ufw governs host services (SSH); Docker publishes ports via iptables
#   directly, bypassing ufw. The stack publishes only 80/443 by design —
#   keep your cloud firewall/security group as the real boundary.
# - Ubuntu's unattended-upgrades ships enabled; this config only adds the
#   pieces that aren't defaults.

package_update: true
package_upgrade: true
packages:
  - ufw

swap:
  filename: /swap.img
  size: 2147483648 # engines spike; 2G headroom keeps the OOM killer away

write_files:
  # ${extra_env} is for additional .env lines (managed DATABASE_URL, OIDC,
  # SMTP); leave it empty for the self-contained default. Everything the
  # stack supports is documented in infra/.env.example.
  - path: /opt/edc/.env
    permissions: "0600"
    content: |
      EDC_DOMAIN=${domain}
      EDC_VERSION=${app_version}
      POSTGRES_PASSWORD=${postgres_password}
      COMPOSE_PROFILES=local-db,engines
      ${extra_env}
  - path: /etc/ssh/sshd_config.d/90-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl reload ssh
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 443/udp
  - ufw --force enable
  # The compose artifacts come from the pinned release tag — the same files
  # a checkout has, never forked copies.
  - curl -fsSL -o /opt/edc/compose.prod.yaml https://raw.githubusercontent.com/tgerke/edc-core/v${app_version}/infra/compose.prod.yaml
  - curl -fsSL -o /opt/edc/Caddyfile https://raw.githubusercontent.com/tgerke/edc-core/v${app_version}/infra/Caddyfile
  - cd /opt/edc && docker compose -f compose.prod.yaml up -d
  - echo "edc-core is starting — point DNS for ${domain} at this host and Caddy obtains TLS automatically. Next; bootstrap the first admin (see /opt/edc or the deployment guide)."
