name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edc
          POSTGRES_PASSWORD: edc-dev-only
          POSTGRES_DB: edc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edc -d edc"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://edc:edc-dev-only@localhost:5432/edc
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is taken from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter @edc-core/web build
