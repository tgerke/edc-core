name: Release

# Tagging vX.Y.Z publishes versioned container images to GHCR and attaches
# the validation pack (traceability matrix joined to this tag's test
# results — P11-05) to the GitHub release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  validation-pack:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edc
          POSTGRES_PASSWORD: edc-dev-only
          POSTGRES_DB: edc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edc -d edc"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://edc:edc-dev-only@localhost:5432/edc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate validation pack
        run: pnpm validation-pack
      - name: Bundle
        run: |
          cp docs/regulatory-traceability.md validation-pack/
          cd validation-pack && zip -r ../validation-pack-${{ github.ref_name }}.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: validation-pack-${{ github.ref_name }}
          path: validation-pack-${{ github.ref_name }}.zip
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: validation-pack-${{ github.ref_name }}.zip

  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: r-engine
            context: services/r-engine
            dockerfile: services/r-engine/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
